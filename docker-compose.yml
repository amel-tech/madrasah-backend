services:
  tedrisat:
    build:
      context: .
      dockerfile: apps/tedrisat/Dockerfile
    ports:
      - "${TEDRISAT_PORT:-3001}:3001"
    env_file:
      - ./apps/tedrisat/.env
    depends_on:
      medaris-db:
        condition: service_healthy

  teskilat:
    build:
      context: .
      dockerfile: apps/teskilat/Dockerfile
    ports:
      - "${TESKILAT_PORT:-3002}:3002"
    env_file:
      - ./apps/teskilat/.env
    depends_on:
      medaris-db:
        condition: service_healthy

  medaris-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${MEDARIS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${MEDARIS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${MEDARIS_POSTGRES_DB:-postgres}
    ports:
      - "${MEDARIS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 7
      start_period: 15s

  # Keycloak runs in `start-dev` mode and keeps its data in the
  # `keycloak_data` named volume — restart/recreate preserves users,
  # clients, realms, and roles. The login theme JAR is mounted from the
  # sibling `madrasah-frontend` repo; build it once with
  # `cd ../madrasah-frontend/apps/keycloak-theme && npm run build-keycloak-theme`
  # before the first `docker compose up`. Set `KEYCLOAK_PORT` if 8080 is
  # taken locally (e.g. `KEYCLOAK_PORT=8088 docker compose up keycloak`).
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    command: ["start-dev"]
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ../madrasah-frontend/apps/keycloak-theme/dist_keycloak/keycloak-theme-for-kc-all-other-versions.jar:/opt/keycloak/providers/keycloak-theme.jar:ro

volumes:
  postgres_data:
  keycloak_data:
